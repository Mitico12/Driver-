<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Driver">
<meta name="theme-color" content="#0f1620">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Driver — Loading</title>
<link rel="manifest" href="./manifest.webmanifest">
<style>
:root{
  --bg:#0f1620; --panel:#161f2c; --panel-2:#1c2735; --line:#27374a;
  --ink:#e8eef5; --ink-dim:#9fb0c2; --now:#23c7c2; --warn:#ffb454;
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);display:grid;place-items:center;padding:24px}
.card{width:min(380px,100%);background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:24px;box-shadow:0 18px 50px rgba(0,0,0,.35)}
.logo{width:48px;height:48px;border-radius:14px;background:var(--now);display:grid;place-items:center;color:#04201f;font-weight:900;font-size:24px;margin-bottom:16px}
h1{font-size:22px;margin:0 0 4px}
p{color:var(--ink-dim);font-size:14px;line-height:1.45;margin:0 0 14px}
.status{background:var(--panel-2);border:1px solid var(--line);border-radius:12px;padding:12px 14px;font-size:13px;color:var(--ink-dim);margin-top:14px}
.bar{height:4px;border-radius:8px;background:var(--panel-2);overflow:hidden;margin-top:16px}
.bar i{display:block;width:44%;height:100%;background:var(--now);border-radius:8px;animation:load 1s infinite ease-in-out}
button,a{display:inline-block;margin-top:14px;background:var(--now);color:#04201f;border:0;border-radius:11px;padding:12px 14px;font-weight:800;text-decoration:none;font-size:14px}
.small{font-size:12px;color:#6b7e92;margin-top:10px}
@keyframes load{0%{transform:translateX(-110%)}100%{transform:translateX(240%)}}
</style>
</head>
<body>
  <div class="card">
    <div class="logo">D</div>
    <h1>Driver</h1>
    <p>Loading the newest app version.</p>
    <div class="status" id="status">Checking GitHub version…</div>
    <div class="bar"><i></i></div>
    <div id="fallback"></div>
    <div class="small">Loader 6.0.0-loader. This page is intentionally tiny and stable.</div>
  </div>
<script type="module">
const LOADER_VERSION = "6.0.0-loader";
const FALLBACK_APP = "./app-v6.html";

const status = document.querySelector("#status");
const fallback = document.querySelector("#fallback");
const say = txt => status.textContent = txt;

async function neutralizeLegacyServiceWorkersAndCaches() {
  say("Clearing old app cache…");
  try {
    if ("serviceWorker" in navigator) {
      const regs = await navigator.serviceWorker.getRegistrations();
      await Promise.all(regs.map(reg => reg.unregister().catch(() => null)));
    }
  } catch(e) { console.warn(e); }

  try {
    if ("caches" in window) {
      const keys = await caches.keys();
      await Promise.all(keys
        .filter(key => key.startsWith("driver-client") || key.startsWith("hfdriver") || key.startsWith("hammerfest"))
        .map(key => caches.delete(key))
      );
    }
  } catch(e) { console.warn(e); }
}

function buildAppUrl(info) {
  const app = String(info.app || FALLBACK_APP);
  const version = String(info.version || LOADER_VERSION);
  const url = new URL(app, window.location.href);
  url.searchParams.set("v", version);
  url.searchParams.set("launch", Date.now());
  return url.href;
}

async function launch() {
  try {
    await neutralizeLegacyServiceWorkersAndCaches();
    say("Fetching latest version…");
    const res = await fetch(`./version.json?t=${Date.now()}`, {
      cache:"no-store",
      headers:{"Cache-Control":"no-cache"}
    });
    if (!res.ok) throw new Error("version.json returned " + res.status);
    const info = await res.json();
    say(`Opening ${info.version || LOADER_VERSION}…`);
    window.location.replace(buildAppUrl(info));
  } catch(e) {
    console.warn(e);
    say("Could not check version. Opening bundled v6 app.");
    const url = new URL(FALLBACK_APP, window.location.href);
    url.searchParams.set("fallback", Date.now());
    fallback.innerHTML = `<a href="${url.href}">Open Driver</a>`;
    setTimeout(() => window.location.replace(url.href), 1200);
  }
}

launch();
</script>
</body>
</html>
