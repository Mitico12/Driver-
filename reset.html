<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Reset Driver App</title>
<style>body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#0f1620;color:#e8eef5;padding:28px;line-height:1.45}button{background:#23c7c2;color:#0f1620;border:0;border-radius:12px;padding:14px 18px;font-weight:800;font-size:16px}pre{white-space:pre-wrap;background:#161f2c;border:1px solid #9b5d17;border-radius:12px;padding:14px}</style></head>
<body><h1>Driver app reset</h1><p>This clears old PWA caches/service workers, then returns to the app. Use only if iPhone is stuck on an old version.</p><button id="go">Reset and reopen app</button><pre id="log"></pre>
<script>
const log = msg => document.querySelector('#log').textContent += msg + '
';
document.querySelector('#go').onclick = async () => {
  try{
    if ('serviceWorker' in navigator){
      const regs = await navigator.serviceWorker.getRegistrations();
      for (const reg of regs){ await reg.unregister(); log('Unregistered service worker'); }
    }
    if ('caches' in window){
      const keys = await caches.keys();
      for (const key of keys){ await caches.delete(key); log('Deleted cache: '+key); }
    }
    localStorage.removeItem('__force_reload_marker');
    log('Done. Reopening fresh app...');
    setTimeout(()=>location.replace('./index.html?reset='+Date.now()), 700);
  }catch(e){ log('Error: '+e.message); }
};
</script></body></html>
