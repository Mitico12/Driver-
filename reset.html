<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Reset Driver App</title>
<style>body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:#0f1620;color:#e8eef5;padding:24px}.box{max-width:420px;margin:40px auto;background:#161f2c;border:1px solid #27374a;border-radius:18px;padding:22px}button,a{display:inline-block;background:#23c7c2;color:#04201f;border:0;border-radius:11px;padding:12px 14px;font-weight:800;text-decoration:none}p{color:#9fb0c2;line-height:1.45}</style></head>
<body><div class="box"><h1>Reset Driver App</h1><p>This clears old service workers and caches, then opens the v6 loader.</p><button id="reset">Reset and open</button><p id="msg"></p></div>
<script>
const msg = document.querySelector('#msg');
document.querySelector('#reset').onclick = async () => {
  msg.textContent = 'Clearing old cache…';
  try { if ('serviceWorker' in navigator) { const regs = await navigator.serviceWorker.getRegistrations(); await Promise.all(regs.map(r => r.unregister())); } } catch(e) {}
  try { if ('caches' in window) { const keys = await caches.keys(); await Promise.all(keys.map(k => caches.delete(k))); } } catch(e) {}
  msg.textContent = 'Opening loader…';
  location.replace('./index.html?reset=' + Date.now());
};
</script></body></html>
