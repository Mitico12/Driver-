<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Hammerfest Dispatch — Prototype 1</title>
<meta name="theme-color" content="#0f1620">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Dispatch">
<link rel="manifest" href="./manifest.webmanifest">
<style>
  :root{
    --bg:#0f1620;            /* deep arctic slate */
    --panel:#161f2c;
    --panel-2:#1c2735;
    --line:#27374a;
    --line-soft:#1f2c3b;
    --ink:#e8eef5;
    --ink-dim:#9fb0c2;
    --ink-faint:#6b7e92;
    --now:#23c7c2;           /* cold arctic cyan */
    --now-glow:rgba(35,199,194,.18);
    --accent:#3ea0ff;
    --warn:#ffb454;
    --danger:#ff6b6b;
    --ok:#4cc38a;
    --header:rgba(15,22,32,.92);
    --ship-bg:#1c3a3a;
    --ship-ink:#7fe3df;
    --radius:10px;
    --mono:"SFMono-Regular",ui-monospace,Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  body.light{
    --bg:#fff7df; --panel:#fff1bd; --panel-2:#ffe69a;
    --line:#d9b95a; --line-soft:#efd184;
    --ink:#2f2308; --ink-dim:#6b5418; --ink-faint:#92732a;
    --now:#c28a00; --now-glow:rgba(194,138,0,.18); --accent:#b07600;
    --warn:#b56200; --danger:#b83928; --ok:#568c28;
    --header:rgba(255,247,223,.92);
    --ship-bg:#ffe7a3; --ship-ink:#6f4b00;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:var(--bg);color:var(--ink);font-family:var(--sans);
    font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased;
  }
  button{font-family:inherit;cursor:pointer}
  input,select,textarea{font-family:inherit}

  /* ---------- top bar ---------- */
  header{
    position:sticky;top:0;z-index:30;
    display:flex;align-items:center;gap:14px;flex-wrap:wrap;
    padding:10px 16px;background:var(--header);
    backdrop-filter:blur(8px);border-bottom:1px solid var(--line);
  }
  .brand{display:flex;align-items:baseline;gap:9px;margin-right:4px}
  .brand b{font-size:15px;letter-spacing:.2px}
  .brand span{font-size:11px;color:var(--ink-faint);letter-spacing:.12em;text-transform:uppercase}
  .roleswitch{display:flex;background:var(--panel-2);border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .roleswitch button{
    background:transparent;border:0;color:var(--ink-dim);
    padding:7px 14px;font-size:13px;font-weight:600
  }
  .roleswitch button.on{background:var(--accent);color:#06243f}
  .spacer{flex:1}
  .driverpick{display:flex;align-items:center;gap:8px}
  .driverpick select{
    background:var(--panel-2);color:var(--ink);border:1px solid var(--line);
    border-radius:8px;padding:7px 10px;font-size:13px;font-weight:600
  }
  .ghost{
    background:var(--panel-2);color:var(--ink-dim);border:1px solid var(--line);
    border-radius:8px;padding:7px 11px;font-size:12.5px;font-weight:600
  }
  .ghost:hover{color:var(--ink);border-color:var(--ink-faint)}
  .primary{
    background:var(--now);color:#04201f;border:0;border-radius:8px;
    padding:8px 14px;font-size:13px;font-weight:700
  }
  .primary:hover{filter:brightness(1.06)}

  /* ---------- date / week nav ---------- */
  .navbar{
    display:flex;align-items:center;gap:10px;flex-wrap:wrap;
    padding:12px 16px;border-bottom:1px solid var(--line-soft)
  }
  .navbar .arrow{
    background:var(--panel-2);border:1px solid var(--line);color:var(--ink);
    width:34px;height:34px;border-radius:8px;font-size:16px;display:grid;place-items:center
  }
  .navbar .arrow:hover{border-color:var(--ink-faint)}
  .navtitle{font-size:18px;font-weight:700;letter-spacing:.2px;min-width:230px}
  .navtitle small{display:block;font-size:11.5px;color:var(--ink-faint);font-weight:600;letter-spacing:.1em;text-transform:uppercase}
  .navbar input[type=date]{
    background:var(--panel-2);color:var(--ink);border:1px solid var(--line);
    border-radius:8px;padding:7px 10px
  }
  .filter{position:relative}
  .filter .ghost.open,.filter .ghost:hover{color:var(--ink);border-color:var(--ink-faint)}
  .filterpanel{position:absolute;top:42px;left:0;z-index:25;display:none;min-width:184px;
    background:var(--panel-2);border:1px solid var(--line);border-radius:10px;padding:6px;
    box-shadow:0 14px 34px rgba(0,0,0,.5)}
  .filter.open .filterpanel{display:block}
  .filterpanel .ph{font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-faint);padding:6px 10px 4px}
  .filteritem{display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:7px;cursor:pointer;font-size:13px;color:var(--ink);user-select:none}
  .filteritem:hover{background:var(--panel)}
  .filteritem input{accent-color:var(--now);width:16px;height:16px;margin:0}

  main{padding:0 16px 80px}

  /* ---------- central day board ---------- */
  .dayhead{display:flex;align-items:baseline;gap:14px;margin:18px 2px 10px}
  .dayhead .count{color:var(--ink-faint);font-size:13px}
  .daytotal{margin-left:auto;font-variant-numeric:tabular-nums}
  .daytotal b{font-size:18px;color:var(--now)}
  .daytotal span{font-size:11px;color:var(--ink-faint);letter-spacing:.1em;text-transform:uppercase;display:block;text-align:right}

  .board{position:relative;border-left:2px solid var(--line);margin-left:62px}
  .nowline{position:absolute;left:-64px;right:0;height:0;border-top:1px dashed var(--now);z-index:2;pointer-events:none}
  .nowline::before{content:"now";position:absolute;left:-2px;top:-9px;font-size:9.5px;color:var(--now);
    background:var(--bg);padding:0 5px;letter-spacing:.14em;text-transform:uppercase}

  .drive{
    position:relative;display:flex;gap:14px;align-items:stretch;
    margin:0 0 8px;padding:11px 14px;background:var(--panel);
    border:1px solid var(--line-soft);border-left:3px solid var(--c,#3ea0ff);
    border-radius:0 var(--radius) var(--radius) 0;cursor:pointer;transition:background .12s,border-color .12s
  }
  .drive:hover{background:var(--panel-2);border-color:var(--line)}
  .drive .time{
    position:absolute;left:-62px;width:50px;text-align:right;
    font-family:var(--mono);font-size:13px;font-weight:600;color:var(--ink);padding-top:1px
  }
  .drive .time::after{content:"";position:absolute;right:-15px;top:6px;width:9px;height:9px;border-radius:50%;
    background:var(--c,#3ea0ff);box-shadow:0 0 0 3px var(--bg)}
  .drive .body{flex:1;min-width:0}
  .drive .route{font-weight:600;font-size:14px;color:var(--ink);display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .drive .meta{margin-top:5px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;color:var(--ink-dim);font-size:12.5px}
  .tag{font-size:11px;font-weight:700;padding:2px 7px;border-radius:5px;letter-spacing:.02em;white-space:nowrap}
  .tag.ship{background:var(--ship-bg);color:var(--ship-ink)}

  /* driver picker in the form */
  .driver-section{border:1px solid var(--line);border-radius:14px;background:linear-gradient(180deg,var(--panel),var(--panel-2));padding:14px;margin:14px 0}
  .driver-head{width:100%;display:flex;align-items:center;gap:12px;margin:0;background:transparent;border:0;color:var(--ink);text-align:left;padding:0;cursor:pointer}
  .driver-head:hover .driver-title b{color:var(--now)}
  .driver-title{flex:1;min-width:0}
  .driver-title b{display:block;font-size:18px;color:var(--ink);transition:color .12s}
  .driver-title small{display:block;color:var(--ink-faint);font-size:12.5px;margin-top:2px}
  .driver-icon{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;color:var(--now);background:var(--now-glow);border:1px solid rgba(35,199,194,.35);font-size:19px;flex:none}
  .driver-summary{display:flex;align-items:center;gap:9px;flex:none}
  .driver-count{border:1px solid rgba(35,199,194,.35);background:var(--now-glow);color:var(--now);border-radius:999px;padding:6px 11px;font-size:12.5px;font-weight:800;white-space:nowrap}
  .driver-arrow{color:var(--now);font-size:16px;font-weight:900;line-height:1;transition:transform .18s ease}
  .driver-section.open .driver-arrow{transform:rotate(180deg)}
  .driver-body{overflow:hidden;max-height:0;opacity:0;padding-top:0;transition:max-height .22s ease,opacity .18s ease,padding-top .18s ease}
  .driver-section.open .driver-body{max-height:640px;opacity:1;padding-top:14px}
  .drvsearch{position:relative;margin-bottom:10px}
  .drvsearch::before{content:"⌕";position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:22px;color:var(--ink-faint);line-height:1}
  .drvsearch input{width:100%;background:rgba(15,22,32,.35);color:var(--ink);border:1px solid var(--line);border-radius:11px;padding:12px 14px 12px 42px;font-size:14.5px;outline:0}
  .drvsearch input:focus{border-color:var(--now);box-shadow:0 0 0 3px var(--now-glow)}
  .drvbox{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;max-height:270px;overflow:auto;padding:2px 2px 8px;scrollbar-width:thin;scrollbar-color:var(--ink-faint) transparent}
  .drvrow{display:flex;align-items:center;gap:11px;min-height:48px;padding:10px 11px;border:1px solid var(--line-soft);border-radius:11px;background:rgba(15,22,32,.22);cursor:pointer;font-size:14px;font-weight:650;user-select:none;color:var(--ink);transition:background .12s,border-color .12s,transform .12s}
  .drvrow:hover{background:var(--panel);border-color:var(--line)}
  .drvrow:active{transform:scale(.99)}
  .drvrow input{accent-color:var(--now);width:19px;height:19px;margin:0;flex:none}
  .drvrow:has(input:checked){border-color:rgba(35,199,194,.55);background:var(--now-glow)}
  .drvrow .dot{width:10px;height:10px;border-radius:50%;flex:none;box-shadow:0 0 0 3px rgba(255,255,255,.04)}
  .drvrow .name{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .drvempty{grid-column:1/-1;color:var(--ink-faint);font-size:13px;text-align:center;padding:18px;border:1px dashed var(--line);border-radius:11px}
  .drvadd{display:flex;gap:8px;padding-top:10px;margin-top:10px;border-top:1px solid var(--line-soft)}
  .drvadd input{flex:1;background:rgba(15,22,32,.35);color:var(--ink);border:1px solid var(--line);border-radius:10px;padding:11px 12px;font-size:14px;min-width:0}
  .drvadd input:focus{outline:0;border-color:var(--now);box-shadow:0 0 0 3px var(--now-glow)}
  .drvadd button{background:var(--now);color:#04201f;border:0;border-radius:10px;padding:10px 14px;font-size:13px;font-weight:800}
  .driver-hint{display:flex;align-items:center;gap:8px;color:var(--ink-faint);font-size:12.5px;margin-top:10px}

  .choice-section{margin-top:11px}
  .choice-section .driver-icon{font-size:17px}
  .choice-options{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;max-height:230px;overflow:auto;padding:2px 2px 8px;scrollbar-width:thin;scrollbar-color:var(--ink-faint) transparent}
  .choicerow{display:flex;align-items:center;gap:11px;min-height:46px;padding:10px 11px;border:1px solid var(--line-soft);border-radius:11px;background:rgba(15,22,32,.22);cursor:pointer;font-size:14px;font-weight:650;user-select:none;color:var(--ink);transition:background .12s,border-color .12s,transform .12s}
  .choicerow:hover{background:var(--panel);border-color:var(--line)}
  .choicerow:active{transform:scale(.99)}
  .choicerow input{accent-color:var(--now);width:18px;height:18px;margin:0;flex:none}
  .choicerow:has(input:checked){border-color:rgba(35,199,194,.55);background:var(--now-glow)}
  .choicerow .name{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .choice-section.open .driver-body{max-height:520px}
  @media (max-width:560px){.choice-options{grid-template-columns:1fr}}
  .driver-hint::before{content:"i";width:17px;height:17px;border-radius:50%;display:grid;place-items:center;border:1px solid var(--now);color:var(--now);font-size:11px;font-weight:800;flex:none}
  @media (max-width:560px){.drvbox{grid-template-columns:1fr}.driver-head{align-items:flex-start}.driver-count{margin-top:3px}}
  .pax{display:inline-flex;align-items:center;gap:4px;font-variant-numeric:tabular-nums;
    background:var(--panel-2);border:1px solid var(--line);border-radius:5px;padding:2px 7px;font-size:12px;font-weight:700}
  .chip{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:700;
    padding:2px 8px 2px 6px;border-radius:20px;color:#06121e}
  .chip i{width:7px;height:7px;border-radius:50%;background:rgba(0,0,0,.35)}
  .price{margin-left:auto;font-family:var(--mono);font-size:13px;color:var(--ink-dim);font-variant-numeric:tabular-nums;align-self:center}

  .empty{padding:40px 12px;text-align:center;color:var(--ink-faint);border:1px dashed var(--line);border-radius:var(--radius)}
  .empty b{display:block;color:var(--ink-dim);margin-bottom:4px;font-size:15px}

  /* ---------- driver week ---------- */
  .week{display:grid;grid-template-columns:repeat(7,1fr);gap:10px;margin-top:14px}
  .wcol{background:var(--panel);border:1px solid var(--line-soft);border-radius:var(--radius);min-height:120px;display:flex;flex-direction:column}
  .wcol.today{border-color:var(--now);box-shadow:0 0 0 1px var(--now-glow)}
  .wcol h4{margin:0;padding:8px 10px;border-bottom:1px solid var(--line-soft);font-size:12px;color:var(--ink-dim);display:flex;justify-content:space-between;align-items:baseline}
  .wcol h4 b{color:var(--ink);font-size:17px;font-weight:700}
  .wcol h4 .early{color:var(--warn);font-size:10px;font-weight:800;letter-spacing:.06em}
  .wbody{padding:7px;display:flex;flex-direction:column;gap:6px;flex:1}
  .wjob{background:var(--panel-2);border:1px solid var(--line-soft);border-left:3px solid var(--c,#3ea0ff);border-radius:6px;padding:7px 8px;cursor:pointer}
  .wjob:hover{border-color:var(--line)}
  .wjob .wt{font-family:var(--mono);font-weight:700;font-size:13px;display:flex;justify-content:space-between;align-items:center}
  .wjob .wt .px{font-size:11px;color:var(--now);font-weight:800}
  .wjob .wr{font-size:12px;color:var(--ink-dim);margin-top:3px;line-height:1.35}
  .wnone{color:var(--ink-faint);font-size:11.5px;text-align:center;padding:14px 0}

  /* ---------- detail / form modal ---------- */
  .scrim{position:fixed;inset:0;background:rgba(6,10,16,.62);z-index:50;display:none;align-items:stretch;justify-content:flex-end}
  .scrim.show{display:flex}
  .sheet{
    width:min(440px,100%);background:var(--panel);border-left:1px solid var(--line);
    height:100%;overflow:auto;animation:slide .18s ease;padding:18px 18px 36px
  }
  @keyframes slide{from{transform:translateX(24px);opacity:.5}to{transform:none;opacity:1}}
  .sheet h3{margin:0 0 2px;font-size:18px}
  .sheet .sub{color:var(--ink-faint);font-size:12.5px;margin-bottom:16px}
  .close{position:absolute;top:14px;right:14px}
  .kv{display:grid;grid-template-columns:96px 1fr;gap:6px 12px;margin:10px 0}
  .kv dt{color:var(--ink-faint);font-size:12px;padding-top:2px}
  .kv dd{margin:0;font-size:13.5px;color:var(--ink)}
  .pax-names{background:var(--panel-2);border:1px solid var(--line-soft);border-radius:8px;padding:10px 12px;margin:10px 0;font-size:13px;line-height:1.55}
  .rowbtns{display:flex;gap:8px;margin-top:18px}

  .field{margin:11px 0}
  .field label{display:block;font-size:11.5px;color:var(--ink-dim);font-weight:600;margin-bottom:5px;letter-spacing:.02em}
  .field input,.field select,.field textarea{
    width:100%;background:var(--panel-2);color:var(--ink);border:1px solid var(--line);
    border-radius:8px;padding:9px 11px;font-size:13.5px
  }
  .field textarea{resize:vertical;min-height:60px}
  .field .hint{font-size:11px;color:var(--ink-faint);margin-top:4px}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:10px}

  /* ---------- settings ---------- */
  .settings{background:var(--panel);border:1px solid var(--line-soft);border-radius:var(--radius);padding:16px 18px;margin-top:16px}
  .settings h3{margin:0 0 4px;font-size:15px}
  .settings .muted{color:var(--ink-faint);font-size:12.5px;margin-bottom:14px}
  .setrow{display:flex;align-items:center;gap:12px;padding:10px 0;border-top:1px solid var(--line-soft)}
  .setrow:first-of-type{border-top:0}
  .setrow .lab{flex:1}
  .setrow .lab b{display:block;font-size:13.5px}
  .setrow .lab small{color:var(--ink-faint);font-size:12px}
  .switch{position:relative;width:42px;height:24px;flex:none}
  .switch input{opacity:0;width:0;height:0}
  .slider{position:absolute;inset:0;background:var(--line);border-radius:20px;transition:.15s}
  .slider::before{content:"";position:absolute;width:18px;height:18px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.15s}
  .switch input:checked + .slider{background:var(--now)}
  .switch input:checked + .slider::before{transform:translateX(18px)}
  .setrow input[type=number]{width:72px;background:var(--panel-2);color:var(--ink);border:1px solid var(--line);border-radius:8px;padding:7px 9px;text-align:center}


  /* ---------- records manager ---------- */
  .record-tabs{display:flex;gap:7px;margin:14px 0 12px;background:var(--panel-2);border:1px solid var(--line);border-radius:12px;padding:5px}
  .record-tabs button{flex:1;background:transparent;border:0;border-radius:9px;color:var(--ink-dim);padding:9px 8px;font-weight:750;font-size:12.5px}
  .record-tabs button.on{background:var(--now);color:#201600}
  .record-add{display:flex;gap:8px;margin:8px 0 12px}
  .record-add input{flex:1;min-width:0;background:var(--panel-2);color:var(--ink);border:1px solid var(--line);border-radius:10px;padding:11px 12px;font-size:14px}
  .record-add input:focus{outline:0;border-color:var(--now);box-shadow:0 0 0 3px var(--now-glow)}
  .record-list{display:flex;flex-direction:column;gap:8px;margin-top:10px}
  .record-row{display:flex;align-items:center;gap:9px;background:var(--panel-2);border:1px solid var(--line-soft);border-radius:12px;padding:10px 11px}
  .record-row .dot{width:11px;height:11px;border-radius:50%;flex:none}
  .record-row b{flex:1;min-width:0;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .record-row small{color:var(--ink-faint);font-size:11.5px;white-space:nowrap}
  .record-row button{background:transparent;border:1px solid var(--line);border-radius:8px;color:var(--ink-dim);padding:6px 8px;font-size:12px;font-weight:700}
  .record-row button:hover{color:var(--ink);border-color:var(--ink-faint)}
  .record-row button.danger{color:var(--danger)}
  .record-empty{color:var(--ink-faint);text-align:center;border:1px dashed var(--line);border-radius:12px;padding:20px;margin-top:10px}

  /* ---------- toasts ---------- */
  .toasts{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);z-index:90;display:flex;flex-direction:column;gap:8px;align-items:center;width:min(420px,92vw)}
  .toast{width:100%;background:var(--panel-2);border:1px solid var(--now);border-left:4px solid var(--now);border-radius:10px;padding:11px 14px;box-shadow:0 8px 30px rgba(0,0,0,.45);animation:pop .2s ease}
  .toast b{display:block;font-size:13.5px;color:var(--ink)}
  .toast span{font-size:12.5px;color:var(--ink-dim)}
  @keyframes pop{from{transform:translateY(8px);opacity:0}to{transform:none;opacity:1}}

  .syncpill{font-size:11px;font-weight:700;letter-spacing:.04em;border:1px solid var(--line);border-radius:20px;
    padding:5px 11px;color:var(--ink-faint);user-select:none;white-space:nowrap}
  .syncpill.live{color:#04201f;background:var(--now);border-color:var(--now)}
  .syncpill.off{color:#3a2a00;background:var(--warn);border-color:var(--warn)}

  .login{position:fixed;inset:0;z-index:100;display:none;place-items:center;background:var(--bg)}
  .login.show{display:grid}
  .loginbox{width:min(360px,92vw);background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:26px 24px 22px;box-shadow:0 20px 60px rgba(0,0,0,.4)}
  .loginbox h2{margin:0 0 2px;font-size:20px}
  .loginsub{color:var(--ink-faint);font-size:13px;margin:0 0 16px}
  .loginerr{color:var(--danger);font-size:12.5px;margin-top:10px;min-height:16px}

  .fab{position:fixed;right:20px;bottom:20px;z-index:40}
  .fab button{background:var(--now);color:#04201f;border:0;border-radius:30px;padding:13px 20px;font-size:14px;font-weight:800;box-shadow:0 8px 26px rgba(35,199,194,.3)}

<script type="module">
"use strict";

const APP_VERSION = "1.0.0";

/* ============================================================
   Supabase — the shared server. Loaded from CDN; if it can't be
   reached (offline), the app falls back to the local cache.

const SUPABASE_URL  = "https://cexzmwucocmqozuqhbeb.supabase.co";
const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNleHptd3Vjb2NtcW96dXFoYmViIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0OTg0NDgsImV4cCI6MjA5ODA3NDQ0OH0.xZ_Ms8ciJZuGA1xiZjFOWPt_VtkCdT1xHFxZ3bBQ0uM";

let supa = null;
try {

const COLS = ["id","date","time","route","drivers","pax","ship","firma","passengers","reference","price","notes"];
const rowFrom = b => { const r={}; COLS.forEach(k=>r[k]=b[k]); r.updated_at=new Date().toISOString(); return r; };

const setPill = (state)=>{          // state: live | off | sync

};

async function cloudFetchAll(){
  const { data, error } = await supa.from("bookings").select("*");
  if(error) throw error;
  return data.map(r=>({ ...r, drivers:r.drivers||[] }));
}
async function cloudUpsert(b){ const { error } = await supa.from("bookings").upsert(rowFrom(b)); if(error) throw error; }
async function cloudDelete(id){ const { error } = await supa.from("bookings").delete().eq("id",id); if(error) throw error; }
async function cloudWipe(){ const { error } = await supa.from("bookings").delete().neq("id","__none__"); if(error) throw error; }

/* ============================================================
   Storage layer — localStorage when available (standalone file),
   in-memory fallback so the Claude preview never crashes.
   ============================================================ */
const Store = (() => {
  let mem = {};
  let hasLS = false;
  try { localStorage.setItem("__t","1"); localStorage.removeItem("__t"); hasLS = true; } catch(e){}
  return {
    persistent: hasLS,
    get(k){ try { return hasLS ? localStorage.getItem(k) : (mem[k] ?? null); } catch(e){ return mem[k] ?? null; } },
    set(k,v){ try { hasLS ? localStorage.setItem(k,v) : (mem[k]=v); } catch(e){ mem[k]=v; } },
    del(k){ try { hasLS ? localStorage.removeItem(k) : (delete mem[k]); } catch(e){ delete mem[k]; } }
  };
})();
const KEY = "hfdispatch.v1";

/* ============================================================
   Date helpers
   ============================================================ */
const NB_DAYS = ["søndag","mandag","tirsdag","onsdag","torsdag","fredag","lørdag"];
const NB_MONTHS = ["januar","februar","mars","april","mai","juni","juli","august","september","oktober","november","desember"];
const pad = n => String(n).padStart(2,"0");
const iso = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
const parseIso = s => { const [y,m,d]=s.split("-").map(Number); return new Date(y,m-1,d); };
const addDays = (d,n)=>{ const x=new Date(d); x.setDate(x.getDate()+n); return x; };
const startOfWeek = d => addDays(d, -((d.getDay()+6)%7));        // Monday
const longDate = d => `${NB_DAYS[d.getDay()]} ${d.getDate()}. ${NB_MONTHS[d.getMonth()]} ${d.getFullYear()}`;
const minutesOf = t => { const [h,m]=t.split(":").map(Number); return h*60+m; };
const todayIso = () => iso(new Date());

/* ============================================================
   Visual identity per driver / company (honours the colour-coded sheet)
   ============================================================ */
const DRIVER_COLORS = ["#3ea0ff","#9b8cff","#ff8fb4","#7ad0a8","#ffc266","#5fd3d0","#f08c6b","#b6d36b","#d59bff","#69b7ff","#ffa6a6","#8fd6a0"];
function colorFor(name){
  if(!name) return "#3ea0ff";
  let h=0; for(const c of name) h=(h*31+c.charCodeAt(0))>>>0;
  return DRIVER_COLORS[h % DRIVER_COLORS.length];
}
const FIRMA_COLORS = {
  "COOR":"#ffe14d",
  "Iberica Knutsen":"#7ad0a8",
  "Widerøe":"#7fb2ff",
  "Hammerfest kommune":"#c0a6ff",
  "Arctic Aurora":"#ffab73",
  "":"#a9bacb"
};
const firmaColor = f => FIRMA_COLORS[f] ?? "#a9bacb";

   Seed data — transcribed from the uploaded schedule (7–8 June 2026)

       passengers:"28 elever + 4 voksne",firma:"Hammerfest kommune",reference:"referanse 2520",price:3900}),

    B({date:D2,time:"19:30",route:"Tuva → Flyplass",drivers:["Robert"],pax:1,ship:"Tuva",firma:"Iberica Knutsen",reference:"PO 56637",price:1500}),
    B({date:D2,time:"18:45",route:"Nybyen – Skytterhuset (buss 1)",drivers:["Magdalena"],firma:"COOR",price:4200}),

/* ============================================================
   App state
   ============================================================ */
let DB;            // {bookings:[], prefs:{}, records:{drivers:[], ships:[], companies:[]}}
const defaultPrefs = { enabled:true, leadMinutes:60, nightBefore:true, nightBeforeHour:20, earlyThreshold:"09:00", theme:"dark",
  display:{ driver:true, company:true, ship:true, pax:true, reference:true, price:true } };
const emptyRecords = () => ({ drivers:[], ships:[], companies:[] });
function uniqueSorted(list){ return [...new Set((list||[]).map(x=>String(x||"").trim()).filter(Boolean))].sort((a,b)=>a.localeCompare(b)); }
function recordsFromBookings(bookings){
  return {
    drivers: uniqueSorted((bookings||[]).flatMap(b=>b.drivers||[])),
    ships: uniqueSorted((bookings||[]).map(b=>b.ship)),
    companies: uniqueSorted(["COOR","Iberica Knutsen","Widerøe","Hammerfest kommune","Arctic Aurora", ...(bookings||[]).map(b=>b.firma)])
  };
}
function ensureRecords(){
  DB.records = {...emptyRecords(), ...(DB.records||{})};
  const fromBookings=recordsFromBookings(DB.bookings||[]);
  DB.records.drivers = uniqueSorted([...DB.records.drivers, ...fromBookings.drivers]);
  DB.records.ships = uniqueSorted([...DB.records.ships, ...fromBookings.ships]);
  DB.records.companies = uniqueSorted([...DB.records.companies, ...fromBookings.companies]);
}
function rememberRecord(kind, value){
  value=String(value||"").trim(); if(!value) return;
  ensureRecords();
  const key = kind==="firma" ? "companies" : kind;
  if(!DB.records[key].some(x=>x.toLowerCase()===value.toLowerCase())) DB.records[key]=uniqueSorted([...DB.records[key], value]);
}

function load(){
  const raw = Store.get(KEY);
  if(raw){ try { DB = JSON.parse(raw); } catch(e){ DB=null; } }
  if(!DB || !DB.bookings){ DB = { bookings: [], prefs:{...defaultPrefs}, records:emptyRecords() }; }
  DB.prefs = {...defaultPrefs, ...(DB.prefs||{})};
  DB.prefs.display = {...defaultPrefs.display, ...(DB.prefs.display||{})};
  ensureRecords();
}
function save(){ ensureRecords(); Store.set(KEY, JSON.stringify(DB)); }

let role = "central";
let currentDay = parseIso("2026-06-08");   // start on a seeded day so it isn't empty
let currentWeek = startOfWeek(currentDay);
let currentDriver = null;

/* ============================================================
   Derived helpers
   ============================================================ */
const allDrivers = () => uniqueSorted([...(DB.records?.drivers||[]), ...DB.bookings.flatMap(b=>b.drivers||[])]);
const allShips = () => uniqueSorted([...(DB.records?.ships||[]), ...DB.bookings.map(b=>b.ship)]);
const allCompanies = () => uniqueSorted([...(DB.records?.companies||[]), ...DB.bookings.map(b=>b.firma)]);
const forDay = d => DB.bookings.filter(b=>b.date===iso(d)).sort((a,b)=>minutesOf(a.time)-minutesOf(b.time));
const forDriverDay = (drv,d) => forDay(d).filter(b=>b.drivers.includes(drv));
const kr = n => (n==null?"–":new Intl.NumberFormat("nb-NO").format(n)+" kr");

/* ============================================================
   Rendering
   ============================================================ */
const $ = s => document.querySelector(s);
const el = (t,c,h)=>{ const e=document.createElement(t); if(c)e.className=c; if(h!=null)e.innerHTML=h; return e; };

function renderNav(){
  const n = $("#navbar"); n.innerHTML="";
  if(role==="central"){
    const prev=el("button","arrow","‹"), next=el("button","arrow","›");
    prev.onclick=()=>{ currentDay=addDays(currentDay,-1); render(); };
    next.onclick=()=>{ currentDay=addDays(currentDay,1); render(); };
    const title=el("div","navtitle",`${longDate(currentDay)}<small>Daily board</small>`);
    const dateInp=el("input"); dateInp.type="date"; dateInp.value=iso(currentDay);
    dateInp.onchange=e=>{ currentDay=parseIso(e.target.value); render(); };
    const today=el("button","ghost","Today"); today.onclick=()=>{ currentDay=new Date(); render(); };
    n.append(prev,next,title,dateInp,today,buildFilter());
  } else {
    const prev=el("button","arrow","‹"), next=el("button","arrow","›");
    prev.onclick=()=>{ currentWeek=addDays(currentWeek,-7); render(); };
    next.onclick=()=>{ currentWeek=addDays(currentWeek,7); render(); };
    const end=addDays(currentWeek,6);
    const label=`${currentWeek.getDate()}. ${NB_MONTHS[currentWeek.getMonth()].slice(0,3)} – ${end.getDate()}. ${NB_MONTHS[end.getMonth()].slice(0,3)} ${end.getFullYear()}`;
    const title=el("div","navtitle",`${label}<small>${currentDriver||"—"} · weekly schedule</small>`);
    const today=el("button","ghost","This week"); today.onclick=()=>{ currentWeek=startOfWeek(new Date()); render(); };
    n.append(prev,next,title,today);
  }
}

function buildFilter(){
  const d=DB.prefs.display;
  const items=[["driver","Driver"],["company","Company"],["ship","Ship"],["pax","Pax"],["reference","Reference"],["price","Price"]];
  const wrap=el("div","filter");
  const btn=el("button","ghost","");
  const setLabel=()=>{ const c=Object.values(d).filter(Boolean).length; btn.innerHTML=`☰ Filter <span style="color:var(--ink-faint)">· ${c}/${items.length}</span>`; };
  setLabel();
  const panel=el("div","filterpanel"); panel.append(el("div","ph","Show on board"));
  items.forEach(([k,label])=>{
    const row=el("label","filteritem",`<input type="checkbox" ${d[k]?"checked":""}><span>${label}</span>`);
    row.querySelector("input").onchange=e=>{ d[k]=e.target.checked; save(); setLabel(); renderCentral(); };
    panel.append(row);
  });
  panel.onclick=e=>e.stopPropagation();
  btn.onclick=e=>{ e.stopPropagation(); document.querySelectorAll(".filter.open").forEach(f=>{if(f!==wrap)f.classList.remove("open")}); wrap.classList.toggle("open"); };
  wrap.append(btn,panel);
  return wrap;
}

function driveTags(b){
  const d=DB.prefs.display; let h="";
  if(d.ship && b.ship) h+=`<span class="tag ship">⚓ ${b.ship}</span>`;
  if(d.company && b.firma) h+=`<span class="chip" style="background:${firmaColor(b.firma)}"><i></i>${b.firma}</span>`;
  return h;
}

function renderCentral(){
  const m=$("#main"); m.innerHTML="";
  const list=forDay(currentDay);
  const total=list.reduce((s,b)=>s+(b.price||0),0);

  const head=el("div","dayhead");
  head.append(
    el("h3",null,"Drivings"),
    el("div","count",`${list.length} ${list.length===1?"driving":"drivings"}`),
    el("div","daytotal",`<b>${kr(total)}</b><span>Day total</span>`)
  );
  m.append(head);

  if(!list.length){
    m.append(el("div","empty","<b>No drivings booked</b>Use “+ New driving” to add the first one for this day."));
    return;
  }

  const board=el("div","board");
  // live now-line, only meaningful when viewing today
  if(iso(currentDay)===todayIso()){
    const now=new Date(), mins=now.getHours()*60+now.getMinutes();
    const span=minutesOf(list[list.length-1].time)-minutesOf(list[0].time)||1;
    // simple proportional placement against the rendered rows is unreliable; place after the matching row instead
  }

  list.forEach(b=>{
    const d=DB.prefs.display;
    const row=el("div","drive"); row.style.setProperty("--c",colorFor(b.drivers[0]));
    const drivers=d.driver ? b.drivers.map(x=>`<span class="chip" style="background:${colorFor(x)}"><i></i>${x}</span>`).join("") : "";
    row.innerHTML=`
      <div class="time">${b.time}</div>
      <div class="body">
        <div class="route">${b.route} ${driveTags(b)}</div>
        <div class="meta">
          ${drivers}
          ${d.pax && b.pax!=null?`<span class="pax">👤 ${b.pax} pax</span>`:""}
          ${d.reference && b.reference?`<span style="color:var(--ink-faint)">${b.reference}</span>`:""}
          ${d.price?`<span class="price">${kr(b.price)}</span>`:""}
        </div>
      </div>`;
    row.onclick=()=>openDetail(b);
    board.append(row);
  });
  m.append(board);
}

function renderDriver(){
  const m=$("#main"); m.innerHTML="";
  if(!currentDriver){ m.append(el("div","empty","<b>Pick a driver</b>Choose who is signed in from the menu up top.")); return; }

  const week=el("div","week");
  let weekCount=0;
  for(let i=0;i<7;i++){
    const d=addDays(currentWeek,i);
    const jobs=forDriverDay(currentDriver,d);
    weekCount+=jobs.length;
    const col=el("div","wcol"+(iso(d)===todayIso()?" today":""));
    const hasEarly=jobs.some(j=>minutesOf(j.time)<minutesOf(DB.prefs.earlyThreshold));
    col.append(el("h4",null,
      `<span>${NB_DAYS[d.getDay()].slice(0,3)} ${d.getDate()}.</span><b>${jobs.length||""}</b>${hasEarly?'<span class="early">EARLY</span>':""}`));
    const body=el("div","wbody");
    if(!jobs.length){ body.append(el("div","wnone","—")); }
    jobs.forEach(b=>{
      const j=el("div","wjob"); j.style.setProperty("--c",colorFor(currentDriver));
      j.innerHTML=`<div class="wt"><span>${b.time}</span>${b.pax!=null?`<span class="px">${b.pax} pax</span>`:""}</div>
                   <div class="wr">${b.route}${b.ship?` · ⚓ ${b.ship}`:""}</div>`;
      j.onclick=()=>openDetail(b,true);
      body.append(j);
    });
    col.append(body);
    week.append(col);
  }
  m.append(week);

  if(!weekCount){
    m.querySelector(".week").after(el("div","empty",`<b>No drivings this week</b>${currentDriver} has nothing booked between these dates.`));
  }
  m.append(renderSettings());
}

function renderSettings(){
  const p=DB.prefs;
  const s=el("div","settings");
  s.innerHTML=`<h3>Reminders</h3>
    <div class="muted">These rules drive the notifications below. In this prototype they fire while the app is open.</div>`;
  const rows=[
    {key:"enabled",type:"toggle",t:"Reminders on",s:"Master switch for all notifications."},
    {key:"leadMinutes",type:"num",t:"Lead time before each driving",s:"Minutes before departure.",suffix:"min"},
    {key:"nightBefore",type:"toggle",t:"Night-before alert for early drivings",s:`Sent the evening before, when a driving starts before ${p.earlyThreshold}.`},
    {key:"nightBeforeHour",type:"num",t:"Night-before alert time",s:"Hour of the evening (24h).",suffix:":00"},
  ];
  rows.forEach(r=>{
    const row=el("div","setrow");
    row.append(el("div","lab",`<b>${r.t}</b><small>${r.s}</small>`));
    if(r.type==="toggle"){
      const sw=el("label","switch"); sw.innerHTML=`<input type="checkbox" ${p[r.key]?"checked":""}><span class="slider"></span>`;
      sw.querySelector("input").onchange=e=>{ p[r.key]=e.target.checked; save(); render(); };
      row.append(sw);
    } else {
      const wrap=el("div",null,`<input type="number" value="${p[r.key]}"> <small style="color:var(--ink-faint)">${r.suffix||""}</small>`);
      wrap.querySelector("input").onchange=e=>{ p[r.key]=Math.max(0,parseInt(e.target.value||0,10)); save(); };
      row.append(wrap);
    }
    s.append(row);
  });
  const btns=el("div","rowbtns");
  const test=el("button","ghost","Send test notification"); test.onclick=fireTest;
  const sim=el("button","primary","Simulate today’s reminders"); sim.onclick=()=>simulateDay();
  btns.append(test,sim); s.append(btns);

  const note=el("div","muted",
    Store.persistent
      ? `Data is saved on this device. Notifications require permission — your browser will ask.`
      : `Heads up: this preview can’t save to disk, so data resets on reload. Download the file and open it locally to keep data.`);
  note.style.marginTop="12px";
  s.append(note);
  return s;
}

/* ============================================================
   Notifications
   ============================================================ */
const fired = new Set();   // de-dupe keys for this session

function notify(title, body){
  pushToast(title, body);
  try{
    if("Notification" in window && Notification.permission==="granted"){
      new Notification(title,{body});
    }
  }catch(e){}
}
function pushToast(title, body){
  const t=el("div","toast",`<b>${title}</b><span>${body}</span>`);
  $("#toasts").append(t);
  setTimeout(()=>{ t.style.opacity="0"; t.style.transition="opacity .4s"; setTimeout(()=>t.remove(),400); }, 6000);
}
async function ensurePermission(){
  if(!("Notification" in window)) return false;
  if(Notification.permission==="granted") return true;
  if(Notification.permission!=="denied"){ try{ return (await Notification.requestPermission())==="granted"; }catch(e){} }
  return false;
}
function fireTest(){ ensurePermission().then(()=>notify("Test reminder","Notifications are working in this session.")); }

// Build the list of reminder events a driver should receive for a given booking
function reminderEvents(b){
  const dep = parseIso(b.date); const [h,mn]=b.time.split(":").map(Number);
  dep.setHours(h,mn,0,0);
  const out=[];
  if(DB.prefs.leadMinutes>0){
    out.push({ at:new Date(dep.getTime()-DB.prefs.leadMinutes*60000),
      key:b.id+"_lead", title:`Driving in ${DB.prefs.leadMinutes} min`,
      body:`${b.time} · ${b.route}${b.pax!=null?` · ${b.pax} pax`:""}` });
  }
  if(DB.prefs.nightBefore && minutesOf(b.time)<minutesOf(DB.prefs.earlyThreshold)){
    const eve=addDays(dep,-1); eve.setHours(DB.prefs.nightBeforeHour,0,0,0);
    out.push({ at:eve, key:b.id+"_night", title:`Early start tomorrow — ${b.time}`,
      body:`${b.route}${b.pax!=null?` · ${b.pax} pax`:""}` });
  }
  return out;
}

// Real-time tick: while open, fire any reminder whose moment just passed (within 60s)
function tick(){
  if(role!=="driver" || !currentDriver || !DB.prefs.enabled) return;
  const now=Date.now();
  DB.bookings.filter(b=>b.drivers.includes(currentDriver)).forEach(b=>{
    reminderEvents(b).forEach(ev=>{
      const dt=now-ev.at.getTime();
      if(dt>=0 && dt<60000 && !fired.has(ev.key)){ fired.add(ev.key); notify(ev.title,ev.body); }
    });
  });
}
setInterval(tick, 20000);

// Simulate: fire every reminder for the driver's CURRENT-DAY drivings now, so the logic is visible on demand
async function simulateDay(){
  if(!currentDriver){ pushToast("Pick a driver","Choose who is signed in first."); return; }
  await ensurePermission();
  const day = iso(new Date()); // simulate "today" — but seed data is in June, so simulate the viewed week's first populated day
  let jobs = DB.bookings.filter(b=>b.drivers.includes(currentDriver) && b.date===day);
  if(!jobs.length){
    // fall back to the soonest day this driver has work in the viewed week
    for(let i=0;i<7;i++){ const d=iso(addDays(currentWeek,i)); const j=DB.bookings.filter(b=>b.drivers.includes(currentDriver)&&b.date===d); if(j.length){ jobs=j; break; } }
  }
  if(!jobs.length){ pushToast("Nothing to simulate",`${currentDriver} has no drivings in view.`); return; }
  let n=0;
  jobs.sort((a,b)=>minutesOf(a.time)-minutesOf(b.time)).forEach((b,idx)=>{
    reminderEvents(b).forEach(ev=>{ setTimeout(()=>notify(ev.title,ev.body), (n++)*900); });
  });
  if(!n) pushToast("No reminders","With current settings these drivings produce no alerts.");
}


/* ============================================================
   Records manager
   ============================================================ */
const recordMeta = {
  drivers:{ label:"Drivers", single:"driver", icon:"☷", values:allDrivers,
    usage:name=>DB.bookings.filter(b=>(b.drivers||[]).includes(name)).length,
    rename:(oldName,newName)=>DB.bookings.forEach(b=>{ b.drivers=uniqueSorted((b.drivers||[]).map(d=>d===oldName?newName:d)); }),
    remove:name=>DB.bookings.forEach(b=>{ b.drivers=(b.drivers||[]).filter(d=>d!==name); }) },
  ships:{ label:"Ships", single:"ship", icon:"⚓", values:allShips,
    usage:name=>DB.bookings.filter(b=>b.ship===name).length,
    rename:(oldName,newName)=>DB.bookings.forEach(b=>{ if(b.ship===oldName) b.ship=newName; }),
    remove:name=>DB.bookings.forEach(b=>{ if(b.ship===name) b.ship=""; }) },
  companies:{ label:"Companies", single:"company", icon:"◆", values:allCompanies,
    usage:name=>DB.bookings.filter(b=>b.firma===name).length,
    rename:(oldName,newName)=>DB.bookings.forEach(b=>{ if(b.firma===oldName) b.firma=newName; }),
    remove:name=>DB.bookings.forEach(b=>{ if(b.firma===name) b.firma=""; }) }
};
let recordsTab="drivers";
function changedBookingsFor(kind, name){
  if(kind==="drivers") return DB.bookings.filter(b=>(b.drivers||[]).includes(name));
  if(kind==="ships") return DB.bookings.filter(b=>b.ship===name);
  return DB.bookings.filter(b=>b.firma===name);
}
function syncChangedBookings(rows){
  if(!online || !rows.length) return;
  rows.forEach(b=>cloudUpsert(b).catch(()=>{}));
}
function openRecords(tab="drivers"){
  recordsTab=tab;
  scrim.classList.add("show");
  const draw=()=>{
    ensureRecords();
    const meta=recordMeta[recordsTab];
    const values=meta.values();
    sheet.innerHTML=`
      <button class="close ghost" onclick="closeSheet()">✕</button>
      <h3>Records</h3>
      <div class="sub">Add, rename, or remove the reusable lists used in the booking form.</div>
      <div class="record-tabs">
        ${Object.entries(recordMeta).map(([key,m])=>`<button type="button" data-tab="${key}" class="${key===recordsTab?'on':''}">${m.label}</button>`).join("")}
      </div>
      <div class="record-add">
        <input id="recordNew" placeholder="Add new ${meta.single}…" autocomplete="off">
        <button class="primary" id="recordAdd">Add</button>
      </div>
      <div class="record-list" id="recordList"></div>`;
    sheet.querySelectorAll(".record-tabs button").forEach(btn=>btn.onclick=()=>{ recordsTab=btn.dataset.tab; draw(); });
    const list=sheet.querySelector("#recordList");
    if(!values.length) list.innerHTML=`<div class="record-empty">No ${meta.label.toLowerCase()} yet.</div>`;
    values.forEach(name=>{
      const row=el("div","record-row");
      const dotColor = recordsTab==="drivers" ? colorFor(name) : (recordsTab==="companies" ? firmaColor(name) : "var(--now)");
      row.innerHTML=`<span class="dot" style="background:${dotColor}"></span><b>${esc(name)}</b><small>${meta.usage(name)} used</small>`;
      const edit=el("button",null,"Edit");
      edit.onclick=()=>{
        const fresh=prompt(`Rename ${meta.single}:`, name); if(fresh==null) return;
        const v=fresh.trim(); if(!v || v===name) return;
        if(meta.values().some(x=>x.toLowerCase()===v.toLowerCase())){ alert("That name already exists."); return; }
        const affected=changedBookingsFor(recordsTab,name);
        DB.records[recordsTab]=DB.records[recordsTab].filter(x=>x!==name).concat(v);
        meta.rename(name,v); save(); syncChangedBookings(affected); render(); draw();
      };
      const del=el("button","danger","Delete");
      del.onclick=()=>{
        const used=meta.usage(name);
        const msg=used ? `Delete ${name}? It will also be removed from ${used} booking${used===1?"":"s"}.` : `Delete ${name}?`;
        if(!confirm(msg)) return;
        const affected=changedBookingsFor(recordsTab,name);
        DB.records[recordsTab]=DB.records[recordsTab].filter(x=>x!==name);
        meta.remove(name); save(); syncChangedBookings(affected); render(); draw();
      };
      row.append(edit,del); list.append(row);
    });
    const add=()=>{
      const inp=sheet.querySelector("#recordNew");
      const v=inp.value.trim(); if(!v) return;
      if(meta.values().some(x=>x.toLowerCase()===v.toLowerCase())){ inp.value=""; return; }
      DB.records[recordsTab]=uniqueSorted([...DB.records[recordsTab], v]);
      ensureRecords(); save(); render(); draw();
    };
    sheet.querySelector("#recordAdd").onclick=add;
    sheet.querySelector("#recordNew").onkeydown=e=>{ if(e.key==="Enter"){ e.preventDefault(); add(); } };
    setTimeout(()=>sheet.querySelector("#recordNew")?.focus(), 50);
  };
  draw();
}

$("#resetData").onclick=async()=>{
  if(online){
    if(!confirm("Replace the SHARED schedule for everyone with the sample week?")) return;
    setPill("sync");
    try{ await cloudWipe(); for(const b of seed()) await cloudUpsert(b); await pullAll(); pushToast("Reset","Sample week loaded for everyone."); }
    catch(e){ pushToast("Reset failed", e.message||"Couldn’t reach the server."); }
  } else {
    if(!confirm("Reload the local sample schedule on this device?")) return;
    DB.bookings=seed(); DB.records=recordsFromBookings(DB.bookings); save(); fired.clear(); render();
  }
};

function applyTheme(){
  const light = DB.prefs.theme==="light";
  document.body.classList.toggle("light", light);
  const btn=$("#themeBtn"); if(btn) btn.innerHTML = light ? "🌙 Dark" : "☀ Light";
}
$("#themeBtn").onclick=()=>{ DB.prefs.theme = DB.prefs.theme==="light" ? "dark" : "light"; save(); applyTheme(); };
document.addEventListener("click",()=>document.querySelectorAll(".filter.open").forEach(f=>f.classList.remove("open")));

/* ============================================================
   Auth + cloud boot
   ============================================================ */
const loginEl=$("#login");
function showLogin(msg){ loginEl.classList.add("show"); if(msg) $("#lg_err").textContent=msg; $("#lg_email").focus(); }
function hideLogin(){ loginEl.classList.remove("show"); }

async function pullAll(){
  setPill("sync");
  try{
    const rows=await cloudFetchAll();
    if(rows.length===0){ for(const b of seed()) await cloudUpsert(b); DB.bookings=seed(); }
    else DB.bookings=rows;
    ensureRecords(); save(); online=true; setPill("live"); render();
  }catch(e){ online=false; setPill("off"); pushToast("Offline","Showing last synced data on this device."); render(); }
}

function subscribeRealtime(){
  if(!supa) return;
  supa.channel("bookings-stream")
    .on("postgres_changes",{event:"*",schema:"public",table:"bookings"},payload=>{
      const { eventType, new:row, old }=payload;
      if(eventType==="DELETE"){ DB.bookings=DB.bookings.filter(x=>x.id!==old.id); }
      else { const r={...row,drivers:row.drivers||[]}; const i=DB.bookings.findIndex(x=>x.id===r.id);
             if(i>=0) DB.bookings[i]=r; else DB.bookings.push(r); }
      ensureRecords(); save(); render();
    }).subscribe();
}

async function startSession(){
  hideLogin();
  $("#signOut").style.display="inline-block";
  await pullAll();
  subscribeRealtime();
}

async function boot(){
  load(); applyTheme(); setRole("central");        // instant paint from cache
  if(!supa){ online=false; setPill("off");
    if(!DB.bookings.length){ DB.bookings=seed(); DB.records=recordsFromBookings(DB.bookings); save(); render(); }
    pushToast("Offline mode","Couldn’t load the sync library — running on local data."); return; }

  const { data:{ session } } = await supa.auth.getSession();
  if(session) startSession(); else showLogin();
}

$("#lg_btn").onclick=async()=>{
  const email=$("#lg_email").value.trim(), pass=$("#lg_pass").value;
  $("#lg_err").textContent=""; $("#lg_btn").textContent="Signing in…";
  const { error }=await supa.auth.signInWithPassword({ email, password:pass });
  $("#lg_btn").textContent="Sign in";
  if(error){ $("#lg_err").textContent=error.message; return; }
  startSession();
};
$("#lg_pass").onkeydown=e=>{ if(e.key==="Enter") $("#lg_btn").click(); };
$("#signOut").onclick=async()=>{ if(supa) await supa.auth.signOut(); online=false; setPill("off");
  $("#signOut").style.display="none"; showLogin("Signed out."); };


/* ============================================================
   PWA automatic app updates — GitHub Pages + service worker
   ============================================================ */
function registerAppUpdates(){
  if(!("serviceWorker" in navigator)) return;

  let refreshing = false;
  navigator.serviceWorker.addEventListener("controllerchange", () => {
    if(refreshing) return;
    refreshing = true;
    // Prevent reload loops on older iOS Safari builds.
    const key = "dispatch.lastAutoReload";
    const last = Number(sessionStorage.getItem(key) || 0);
    const now = Date.now();
    if(now - last > 2500){
      sessionStorage.setItem(key, String(now));
      window.location.reload();
    }
  });

  window.addEventListener("load", async () => {
    try{
      const reg = await navigator.serviceWorker.register("./service-worker.js", { updateViaCache:"none" });

      // If an update is already downloaded, activate it immediately.
      if(reg.waiting) reg.waiting.postMessage({ type:"SKIP_WAITING" });

      reg.addEventListener("updatefound", () => {
        const worker = reg.installing;
        if(!worker) return;
        worker.addEventListener("statechange", () => {
          if(worker.state === "installed" && navigator.serviceWorker.controller){
            worker.postMessage({ type:"SKIP_WAITING" });
          }
        });
      });

      // Check for a newer app when the driver reopens the app.
      document.addEventListener("visibilitychange", () => {
        if(document.visibilityState === "visible") reg.update().catch(()=>{});
      });

      // Also check occasionally while it is open.
      setInterval(() => reg.update().catch(()=>{}), 30 * 60 * 1000);
    }catch(e){ console.warn("App auto-update unavailable", e); }
  });
}
registerAppUpdates();

boot();
</script>
